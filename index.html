<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speed Reading RSVP Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        textarea {
            width: 90%;
            max-width: 800px;
            height: 140px;
            margin-bottom: 15px;
            font-size: 16px;
            padding: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input[type="number"] {
            width: 90px;
            padding: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

            button.start {
                background: #00c853;
            }

            button.pause {
                background: #ffab00;
            }

            button.reset {
                background: #d50000;
                color: #fff;
            }

        #reader {
            margin-top: 40px;
            font-size: 48px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .focus {
            color: #00e5ff;
        }
    </style>
</head>
<body>

    <h1>RSVP Speed Reader</h1>

    <textarea id="textInput" placeholder="Paste your text here..."></textarea>

    <div class="controls">
        <label>
            WPM:
            <input type="number" id="wpm" value="300" min="100" max="1000">
        </label>
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
    </div>

    <div id="reader"></div>

    <script>
        let words = [];
        let index = 0;
        let interval = null;

        function formatWord(word) {
            const mid = Math.floor(word.length / 2);
            return word
                .substring(0, mid) +
                '<span class="focus">' + word[mid] + '</span>' +
                word.substring(mid + 1);
        }

        function showWord() {
            if (index >= words.length) {
                clearInterval(interval);
                return;
            }
            document.getElementById("reader").innerHTML = formatWord(words[index]);
            index++;
        }

        function start() {
            if (interval) return;

            if (words.length === 0) {
                const text = document.getElementById("textInput").value.trim();
                words = text.split(/\s+/);
                index = 0;
            }

            const wpm = parseInt(document.getElementById("wpm").value);
            const delay = 60000 / wpm;

            interval = setInterval(showWord, delay);
        }

        function pause() {
            clearInterval(interval);
            interval = null;
        }

        function reset() {
            pause();
            words = [];
            index = 0;
            document.getElementById("reader").innerHTML = "";
        }
    </script>

</body>
</html>
